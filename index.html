<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="author" content="Berefire">

  <meta name="description"
    content="Frontend Mentor challenge solution for the Time Tracking Dashboard. Built with semantic HTML, modular CSS architecture, and vainilla JavaScript.">

  <link rel="icon" type="image/png" sizes="32x32" href="/time-tracking-dashboard/assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Time tracking dashboard</title>

  <script type="module" crossorigin src="/time-tracking-dashboard/assets/index-DPvuSFaQ.js"></script>
  <link rel="stylesheet" crossorigin href="/time-tracking-dashboard/assets/index-Bp8mVkS9.css">
</head>

<body>
  <main class="cover">
    <section class="box-xl grid" aria-labelledby="dashboard-heading">
      <h1 id="dashboard-heading" class="sr-only">Time Tracking Dashboard</h1>
      <div id="timeframe-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>

      <article class="profile-card card--main" aria-labelledby="profile-heading">
        <header class="profile-card__info cluster box-lg">
          <img class="profile-card__avatar" height="234" width="234" src="/time-tracking-dashboard/assets/images/image-jeremy.png"
            alt="Jeremy Robson's avatar">
          <div class="profile-card__details">
            <p class="profile-card__report">Report for</p>
            <h2 id="profile-heading" class="profile-card__name">Jeremy Robson</h2>
          </div>
        </header>
        <fieldset class="profile-card__time box-sm cluster-sm">
          <legend class="sr-only">Timeframe</legend>
          <label class="time-button">
            <input type="radio" name="timeframe" value="daily" class="time-button__input" />
            <span class="time-button--visual">Daily</span>
          </label>

          <label class="time-button">
            <input type="radio" name="timeframe" checked value="weekly" class="time-button__input" />
            <span class="time-button--visual">Weekly</span>
          </label>

          <label class="time-button">
            <input type="radio" name="timeframe" value="monthly" class="time-button__input" />
            <span class="time-button--visual">Monthly</span>
          </label>
        </fieldset>
      </article>

      <section class="activities" aria-labelledby="activities-label">
        <h2 id="activities-label" class="sr-only">Recent Activities</h2>
        <ul class="activities__list">
          <li class="activity activity--work" data-activity="work">
            <article class="activity__card" aria-labelledby="activity-work-title">
              <span class="activity__icon icon--work" aria-hidden="true">
              </span>
              <div class="activity__details box">
                <div class="activity__title-container">
                  <h3 class="activity__title" id="activity-work-title">Work</h3>
                  <button type="button" class="activity-options__btn" aria-label="More options for Work">
                    <svg width="21" height="5" xmlns="http://www.w3.org/2000/svg">
                      <path
                        d="M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z"
                        fill="#BBC0FF" fill-rule="evenodd" />
                    </svg>
                  </button>
                </div>
                <div class="activity__time-container">
                  <p class="activity__current-time"></p>
                  <p class="activity__time-stamp">
                    <span class="activity__previous-timeframe"></span> - <span class="activity__previous-time"></span>
                  </p>
                </div>
              </div>
            </article>
          </li>

          <li class="activity activity--play" data-activity="play">
            <article class="activity__card" aria-labelledby="activity-play-title">
              <span class="activity__icon icon--play" aria-hidden="true">
              </span>
              <div class="activity__details box">
                <div class="activity__title-container">
                  <h3 class="activity__title" id="activity-play-title">Play</h3>
                  <button type="button" class="activity-options__btn" aria-label="More options for Play">
                    <svg width="21" height="5" xmlns="http://www.w3.org/2000/svg">
                      <path
                        d="M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z"
                        fill="#BBC0FF" fill-rule="evenodd" />
                    </svg>
                  </button>
                </div>
                <div class="activity__time-container">
                  <p class="activity__current-time"></p>
                  <p class="activity__time-stamp">
                    <span class="activity__previous-timeframe"></span> - <span class="activity__previous-time"></span>
                  </p>
                </div>
              </div>
            </article>
          </li>

          <li class="activity activity--study" data-activity="study">
            <article class="activity__card" aria-labelledby="activity-study-title">
              <span class="activity__icon icon--study" aria-hidden="true">
              </span>
              <div class="activity__details box">
                <div class="activity__title-container">
                  <h3 class="activity__title" id="activity-study-title">Study</h3>
                  <button type="button" class="activity-options__btn" aria-label="More options for Study">
                    <svg width="21" height="5" xmlns="http://www.w3.org/2000/svg">
                      <path
                        d="M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z"
                        fill="#BBC0FF" fill-rule="evenodd" />
                    </svg>
                  </button>
                </div>
                <div class="activity__time-container">
                  <p class="activity__current-time"></p>
                  <p class="activity__time-stamp">
                    <span class="activity__previous-timeframe"></span> - <span class="activity__previous-time"></span>
                  </p>
                </div>
              </div>
            </article>
          </li>

          <li class="activity activity--exercise" data-activity="exercise">
            <article class="activity__card" aria-labelledby="activity-exercise-title">
              <span class="activity__icon icon--exercise" aria-hidden="true">
              </span>
              <div class="activity__details box">
                <div class="activity__title-container">
                  <h3 class="activity__title" id="activity-exercise-title">Exercise</h3>
                  <button type="button" class="activity-options__btn" aria-label="More options for Exercise">
                    <svg width="21" height="5" xmlns="http://www.w3.org/2000/svg">
                      <path
                        d="M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z"
                        fill="#BBC0FF" fill-rule="evenodd" />
                    </svg>
                  </button>
                </div>
                <div class="activity__time-container">
                  <p class="activity__current-time"></p>
                  <p class="activity__time-stamp">
                    <span class="activity__previous-timeframe"></span> - <span class="activity__previous-time"></span>
                  </p>
                </div>
              </div>
            </article>
          </li>

          <li class="activity activity--social" data-activity="social">
            <article class="activity__card" aria-labelledby="activity-social-title">
              <span class="activity__icon icon--social" aria-hidden="true">
              </span>
              <div class="activity__details box">
                <div class="activity__title-container">
                  <h3 class="activity__title" id="activity-social-title">Social</h3>
                  <button type="button" class="activity-options__btn" aria-label="More options for Social">
                    <svg width="21" height="5" xmlns="http://www.w3.org/2000/svg">
                      <path
                        d="M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z"
                        fill="#BBC0FF" fill-rule="evenodd" />
                    </svg>
                  </button>
                </div>
                <div class="activity__time-container">
                  <p class="activity__current-time"></p>
                  <p class="activity__time-stamp">
                    <span class="activity__previous-timeframe"></span> - <span class="activity__previous-time"></span>
                  </p>
                </div>
              </div>
            </article>
          </li>

          <li class="activity activity--self-care" data-activity="self-care">
            <article class="activity__card" aria-labelledby="activity-self-care-title">
              <span class="activity__icon icon--self-care" aria-hidden="true">
              </span>
              <div class="activity__details box">
                <div class="activity__title-container">
                  <h3 class="activity__title" id="activity-self-care-title">Self Care</h3>
                  <button type="button" class="activity-options__btn" aria-label="More options for Self Care">
                    <svg width="21" height="5" xmlns="http://www.w3.org/2000/svg">
                      <path
                        d="M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z"
                        fill="#BBC0FF" fill-rule="evenodd" />
                    </svg>
                  </button>
                </div>
                <div class="activity__time-container">
                  <p class="activity__current-time"></p>
                  <p class="activity__time-stamp">
                    <span class="activity__previous-timeframe"></span> - <span class="activity__previous-time"></span>
                  </p>
                </div>
              </div>
            </article>
          </li>
        </ul>
      </section>

    </section>
  </main>
  <footer class="attribution">
    Challenge by <a class="link" href="https://www.frontendmentor.io?ref=challenge" target="_blank"
      rel="noopener noreferrer" aria-label="Frontend Mentor (opens in a new tab)">Frontend Mentor <span
        aria-hidden="true" class="external-icon">🔗</span></a>.
    Coded by <a class="link" target="_blank" rel="noopener noreferrer" aria-label="Author (opens in a new tab)"
      href="#">Berefire</a>.
  </footer>
</body>

</html>
