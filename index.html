<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="author" content="Berefire">

  <meta name="description"
    content="Frontend Mentor challenge solution for the Time Tracking Dashboard. Built with semantic HTML, modular CSS architecture, and vainilla JavaScript.">

  <link rel="icon" type="image/png" sizes="32x32" href="/time-tracking-dashboard/assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Time tracking dashboard</title>

  <script type="module" crossorigin src="/time-tracking-dashboard/assets/index-Bkunp5WA.js"></script>
  <link rel="stylesheet" crossorigin href="/time-tracking-dashboard/assets/index-qvMQHBiC.css">
</head>

<body>
  <main class="cover">
    <section class="dashboard box-xl">
      <div id="timeframe-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
      <ul class="cards grid">
        <li class="card--main">
          <div class="profile-card">
            <header class="profile-card__info cluster box-lg">
              <img class="profile-card__avatar" height="234" width="234" src="/time-tracking-dashboard/assets/images/image-jeremy.png"
                alt="Jeremy Robson's avatar">
              <div class="profile-card__details">
                <p class="profile-card__report">Report for</p>
                <h1 class="profile-card__name">Jeremy Robson</h1>
              </div>
            </header>
            <h3 id="timeframe-label" class="sr-only">Timeframe selection</h3> 
            <div class="profile-card__time box-sm cluster-sm" role="radiogroup" aria-labelledby="timeframe-label">

              <label class="time-button">
                <input type="radio" name="timeframe" value="daily" data-timeframe="daily" class="time-button__input" />
                <span class="time-button--visual">Daily</span>
              </label>

              <label class="time-button">
                <input type="radio" name="timeframe" checked value="weekly" data-timeframe="weekly"
                  class="time-button__input" />
                <span class="time-button--visual">Weekly</span>
              </label>

              <label class="time-button">
                <input type="radio" name="timeframe" value="monthly" data-timeframe="monthly"
                  class="time-button__input" />
                <span class="time-button--visual">Monthly</span>
              </label>
            </div>
          </div>
        </li>

        <li class="card--work">
          <div class="activity activity--work" data-activity="work">
            <span class="activity__icon icon--work" aria-hidden="true">
            </span>
            <div class="activity__details box">
              <div class="activity__title-container">
                <h2 class="activity__title">Work</h2>
                <button type="button" class="activity-options__btn" aria-label="More options for Work activity">
                  <svg width="21" height="5" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z"
                      fill="#BBC0FF" fill-rule="evenodd" />
                  </svg>
                </button>
              </div>
              <div class="activity__time-container">
                <p class="activity__current-time"></p>
                <p class="activity__time-stamp">
                  <span class="activity__previous-timeframe"></span> - <span class="activity__previous-time"></span>
                </p>
              </div>
            </div>
          </div>
        </li>

        <li class="card--play">
          <div class="activity activity--play" data-activity="play">
            <span class="activity__icon icon--play" aria-hidden="true">
            </span>
            <div class="activity__details box">
              <div class="activity__title-container">
                <h2 class="activity__title">Play</h2>
                <button type="button" class="activity-options__btn" aria-label="More options for Play activity">
                  <svg width="21" height="5" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z"
                      fill="#BBC0FF" fill-rule="evenodd" />
                  </svg>
                </button>
              </div>
              <div class="activity__time-container">
                <p class="activity__current-time"></p>
                <p class="activity__time-stamp">
                  <span class="activity__previous-timeframe"></span> - <span class="activity__previous-time"></span>
                </p>
              </div>
            </div>
          </div>

        </li>

        <li class="card--study">
          <div class="activity activity--study" data-activity="study">
            <span class="activity__icon icon--study" aria-hidden="true">
            </span>
            <div class="activity__details box">
              <div class="activity__title-container">
                <h2 class="activity__title">Study</h2>
                <button type="button" class="activity-options__btn" aria-label="More options for Study activity">
                  <svg width="21" height="5" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z"
                      fill="#BBC0FF" fill-rule="evenodd" />
                  </svg>
                </button>
              </div>
              <div class="activity__time-container">
                <p class="activity__current-time"></p>
                <p class="activity__time-stamp">
                  <span class="activity__previous-timeframe"></span> - <span class="activity__previous-time"></span>
                </p>
              </div>
            </div>
          </div>

        </li>

        <li class="card--exercise">
          <div class="activity activity--exercise" data-activity="exercise">
            <span class="activity__icon icon--exercise" aria-hidden="true">
            </span>
            <div class="activity__details box">
              <div class="activity__title-container">
                <h2 class="activity__title">Exercise</h2>
                <button type="button" class="activity-options__btn" aria-label="More options for Exercise activity">
                  <svg width="21" height="5" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z"
                      fill="#BBC0FF" fill-rule="evenodd" />
                  </svg>
                </button>
              </div>
              <div class="activity__time-container">
                <p class="activity__current-time"></p>
                <p class="activity__time-stamp">
                  <span class="activity__previous-timeframe"></span> - <span class="activity__previous-time"></span>
                </p>
              </div>
            </div>
          </div>
        </li>

        <li class="card--social">
          <div class="activity activity--social" data-activity="social">
            <span class="activity__icon icon--social" aria-hidden="true">
            </span>
            <div class="activity__details box">
              <div class="activity__title-container">
                <h2 class="activity__title">Social</h2>
                <button type="button" class="activity-options__btn" aria-label="More options for Social activity">
                  <svg width="21" height="5" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z"
                      fill="#BBC0FF" fill-rule="evenodd" />
                  </svg>
                </button>
              </div>
              <div class="activity__time-container">
                <p class="activity__current-time"></p>
                <p class="activity__time-stamp">
                  <span class="activity__previous-timeframe"></span> - <span class="activity__previous-time"></span>
                </p>
              </div>
            </div>

        </li>

        <li class="card--self-care">
          <div class="activity activity--self-care" data-activity="self-care">
            <span class="activity__icon icon--self-care" aria-hidden="true">
            </span>
            <div class="activity__details box">
              <div class="activity__title-container">
                <h2 class="activity__title">Self Care</h2>
                <button type="button" class="activity-options__btn" aria-label="More options for Self Care activity">
                  <svg width="21" height="5" xmlns="http://www.w3.org/2000/svg">
                    <path
                      d="M2.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Zm8 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5Z"
                      fill="#BBC0FF" fill-rule="evenodd" />
                  </svg>
                </button>
              </div>
              <div class="activity__time-container">
                <p class="activity__current-time"></p>
                <p class="activity__time-stamp">
                  <span class="activity__previous-timeframe"></span> - <span class="activity__previous-time"></span>
                </p>
              </div>
            </div>
        </li>

      </ul>


    </section>

  </main>
  <footer class="attribution">
    Challenge by <a class="link" href="https://www.frontendmentor.io?ref=challenge" target="_blank"
      rel="noopener noreferrer" aria-label="Frontend Mentor (opens in a new tab)">Frontend Mentor <span
        aria-hidden="true" class="external-icon">🔗</span></a>.
    Coded by <a class="link" target="_blank" rel="noopener noreferrer" aria-label="Author (opens in a new tab)"
      href="#">Berefire</a>.
  </footer>
</body>

</html>
